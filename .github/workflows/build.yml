name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21' # <-- Átírva 21-re a jobb Gradle 8.2+ kompatibilitás miatt

      - name: Install dependencies
        run: npm install

      # Biztonsági lépés: Ha már létezik az android mappa, a cap add hibát adna.
      # Ezzel a paranccsal csak akkor adja hozzá, ha még nincs ott.
      - name: Add Android platform if not exists
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      # Beépített Gradle gyorsítótár kezelő (ez sokkal megbízhatóbb, mint a kézi törlés)
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
