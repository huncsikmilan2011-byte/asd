name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform if not exists
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      # JAVÍTÁS 1: Beállítjuk a minSdkVersion-t 23-ra a hirdetések miatt
      - name: Update minSdkVersion to 23
        run: |
          if [ -f "android/variables.gradle" ]; then
            sed -i 's/minSdkVersion = .*/minSdkVersion = 23/g' android/variables.gradle
          fi

      # JAVÍTÁS 2: Kényszerítjük a stabil verziókat, hogy ne akadjon össze semmi
      - name: Fix AndroidX SDK 35 and BouncyCastle Bug
        run: |
          if [ -f "android/build.gradle" ]; then
            echo "subprojects {
                buildscript {
                    configurations.all {
                        resolutionStrategy {
                            force 'org.bouncycastle:bcprov-jdk18on:1.74'
                        }
                    }
                }
                configurations.all {
                    resolutionStrategy {
                        force 'androidx.core:core:1.12.0'
                        force 'androidx.core:core-ktx:1.12.0'
                    }
                }
            }" >> android/build.gradle
          fi

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      # JAVÍTÁS 3: Korlátozzuk a memóriát (org.gradle.jvmargs), hogy ne omoljon össze a gép hibaüzenet nélkül
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
