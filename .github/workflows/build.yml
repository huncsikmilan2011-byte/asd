name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17' # Visszatérünk a 17-re, de kényszerített függőséggel

      - name: Install dependencies
        run: npm install

      - name: Add Android platform if not exists
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      # EZ A JAVÍTÁS: Belenyúlunk az android/build.gradle fájlba, 
      # és rákényszerítjük a stabil BouncyCastle verziót, ami nem dob hibát.
      - name: Fix BouncyCastle Gradle Bug
        run: |
          if [ -f "android/build.gradle" ]; then
            echo "subprojects {
                buildscript {
                    configurations.all {
                        resolutionStrategy {
                            force 'org.bouncycastle:bcprov-jdk18on:1.74'
                        }
                    }
                }
            }" >> android/build.gradle
          fi

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
