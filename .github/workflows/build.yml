name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21' # <-- JAVÍTÁS: Felemelve 21-re, hogy az AdMob plugin le tudjon fordulni

      - name: Install dependencies
        run: npm install

      - name: Add Android platform if not exists
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      # Beállítjuk a minSdkVersion-t 23-ra a hirdetések miatt
      - name: Update minSdkVersion to 23
        run: |
          if [ -f "android/variables.gradle" ]; then
            sed -i 's/minSdkVersion = .*/minSdkVersion = 23/g' android/variables.gradle
          fi

      # Kényszerítjük a stabil verziókat és kikapcsoljuk az AAR ellenőrzést
      - name: Fix AndroidX and Disable Metadata Check
        run: |
          if [ -f "android/build.gradle" ]; then
            echo "subprojects {
                buildscript {
                    configurations.all {
                        resolutionStrategy {
                            force 'org.bouncycastle:bcprov-jdk18on:1.74'
                        }
                    }
                }
                configurations.all {
                    resolutionStrategy {
                        force 'androidx.core:core:1.12.0'
                        force 'androidx.core:core-ktx:1.12.0'
                    }
                }
                tasks.withType(com.android.build.gradle.internal.tasks.CheckAarMetadataTask) {
                    enabled = false
                }
            }" >> android/build.gradle
          fi

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      # Egyetlen szálon indítjuk a buildet, biztonságos memóriabeállítással
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --max-workers=1 -Dorg.gradle.jvmargs="-Xmx3g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
