name: Auto-Generate Key and Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      # Letöröljük a régi android mappát, hogy a friss konfigurációval hozza létre újra
      - name: Recreate Android Platform from scratch
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      # JAVÍTÁS: Beírjuk a TE SAJÁT AdMob App ID-dat az Android Manifestbe
      - name: Inject AdMob App ID into AndroidManifest
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            sed -i '/<\/application>/i \        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-8597122869755427~6438168416"\/>' "$MANIFEST_PATH"
          fi

      # Frissítjük az SDK verziókat 35-re az új mappában
      - name: Update Android SDK Versions to 35
        run: |
          if [ -f "android/variables.gradle" ]; then
            sed -i 's/minSdkVersion = .*/minSdkVersion = 23/g' android/variables.gradle
            sed -i 's/compileSdkVersion = .*/compileSdkVersion = 35/g' android/variables.gradle
            sed -i 's/targetSdkVersion = .*/targetSdkVersion = 35/g' android/variables.gradle
          fi

      # Kényszerítjük a stabil verziókat és kikapcsoljuk az AAR ellenőrzést
      - name: Fix AndroidX and Disable Metadata Check
        run: |
          if [ -f "android/build.gradle" ]; then
            echo "subprojects {
                buildscript {
                    configurations.all {
                        resolutionStrategy {
                            force 'org.bouncycastle:bcprov-jdk18on:1.74'
                        }
                    }
                }
                configurations.all {
                    resolutionStrategy {
                        force 'androidx.core:core:1.12.0'
                        force 'androidx.core:core-ktx:1.12.0'
                    }
                }
                tasks.withType(com.android.build.gradle.internal.tasks.CheckAarMetadataTask) {
                    enabled = false
                }
            }" >> android/build.gradle
          fi

      # AUTOMATIKUS KULCSGENERÁLÁS: Létrehozunk egy kulcsot a háttérben
      - name: Generate Release Key Automatically
        run: |
          keytool -genkey -v -keystore android/app/auto-release.jks \
            -alias mykeyalias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass MySecretPassword123 -keypass MySecretPassword123 \
            -dname "CN=MyApp, OU=Dev, O=Company, L=City, S=State, C=US"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      # Aláírt Release AAB buildelése az imént generált kulccsal
      - name: Build Signed AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=auto-release.jks \
            -Pandroid.injected.signing.store.password="MySecretPassword123" \
            -Pandroid.injected.signing.key.alias="mykeyalias" \
            -Pandroid.injected.signing.key.password="MySecretPassword123" \
            --no-daemon --max-workers=1 -Dorg.gradle.jvmargs="-Xmx3g"

      # A kész, aláírt AAB fájl mentése
      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
