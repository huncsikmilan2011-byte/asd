name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform if not exists
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      # ÚJ JAVÍTÁS: Ha a capacitor.config.ts-ből nem ment át, itt kényszerítve beírjuk az Android Manifestbe az AdMob ID-t
      - name: Inject AdMob App ID into AndroidManifest
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            # Megnézzük, benne van-e már az AdMob metaadat, ha nincs, beszúrjuk az <application> tagon belülre
            if ! grep -q "com.google.android.gms.ads.APPLICATION_ID" "$MANIFEST_PATH"; then
              sed -i '/<\/application>/i \        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713"\/>' "$MANIFEST_PATH"
            fi
          fi

      # Frissítjük a minSdkVersion-t 23-ra, a compile és target SDK-t pedig 35-re (Android 15)
      - name: Update Android SDK Versions to 35
        run: |
          if [ -f "android/variables.gradle" ]; then
            sed -i 's/minSdkVersion = .*/minSdkVersion = 23/g' android/variables.gradle
            sed -i 's/compileSdkVersion = .*/compileSdkVersion = 35/g' android/variables.gradle
            sed -i 's/targetSdkVersion = .*/targetSdkVersion = 35/g' android/variables.gradle
          fi

      # Kényszerítjük a stabil verziókat és kikapcsoljuk az AAR ellenőrzést
      - name: Fix AndroidX and Disable Metadata Check
        run: |
          if [ -f "android/build.gradle" ]; then
            echo "subprojects {
                buildscript {
                    configurations.all {
                        resolutionStrategy {
                            force 'org.bouncycastle:bcprov-jdk18on:1.74'
                        }
                    }
                }
                configurations.all {
                    resolutionStrategy {
                        force 'androidx.core:core:1.12.0'
                        force 'androidx.core:core-ktx:1.12.0'
                    }
                }
                tasks.withType(com.android.build.gradle.internal.tasks.CheckAarMetadataTask) {
                    enabled = false
                }
            }" >> android/build.gradle
          fi

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      # Egyetlen szálon indítjuk a buildet, biztonságos memóriabeállítással
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --max-workers=1 -Dorg.gradle.jvmargs="-Xmx3g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
